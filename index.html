<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Repository | Centralized Dashboards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="glass-effect border-b border-slate-200 px-6 h-16 flex items-center justify-between sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-200">
                    <i data-lucide="layout-dashboard" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="font-bold text-lg tracking-tight">BI Repository</h1>
            </div>
            <div class="flex gap-2" id="header-actions">
                <button onclick="toggleModal('share')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold text-sm flex items-center gap-2 transition-all active:scale-95 shadow-md">
                    <i data-lucide="share-2" class="w-4 h-4"></i> Share
                </button>
                <button onclick="toggleModal('settings')" class="p-2 text-slate-400 hover:bg-slate-100 rounded-lg transition-colors">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 max-w-6xl w-full mx-auto p-6">
            <!-- Breadcrumbs -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <nav id="breadcrumbs" class="flex items-center gap-2 text-sm text-slate-500 overflow-x-auto whitespace-nowrap py-2">
                    <!-- Dynamic Breadcrumbs -->
                </nav>
                <div class="flex gap-2">
                    <button onclick="toggleModal('folder')" class="bg-white border border-slate-200 px-4 py-2 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-50 transition-all">New Folder</button>
                    <button onclick="toggleModal('dashboard')" class="bg-slate-900 hover:bg-black text-white px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-lg">+ Add Report</button>
                </div>
            </div>

            <!-- Grid Container -->
            <div id="grid-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <!-- Items will be injected here -->
                <div class="col-span-full py-20 flex flex-col items-center justify-center opacity-50">
                    <div class="loader mb-4"></div>
                    <p>Loading repository...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals Container -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                <h2 id="modal-title" class="font-bold text-slate-800 uppercase text-[10px] tracking-widest">Modal</h2>
                <button onclick="toggleModal(null)" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="modal-body" class="p-6">
                <!-- Dynamic Modal Content -->
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let state = {
            user: null,
            items: [],
            currentFolderId: null,
            config: { baseUrl: '' },
            isSaving: false
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'global-bi-repo';
        const firebaseConfig = JSON.parse(__firebase_config || '{}');

        // --- Initialization ---
        async function init() {
            if (firebaseConfig.apiKey) {
                firebase.initializeApp(firebaseConfig);
                const auth = firebase.auth();
                const db = firebase.firestore();

                auth.onAuthStateChanged(async (user) => {
                    if (!user) {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    }
                    state.user = user;
                    setupListeners(db);
                });
            }
        }

        function setupListeners(db) {
            const rootRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
            
            // Listen for items
            rootRef.collection('repository_items').onSnapshot(snap => {
                state.items = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            });

            // Listen for config
            rootRef.collection('config').doc('settings').onSnapshot(doc => {
                if (doc.exists) state.config = doc.data();
                render();
            });
        }

        // --- UI Logic ---
        function render() {
            const container = document.getElementById('grid-container');
            const breadcrumbNav = document.getElementById('breadcrumbs');
            
            // Render Breadcrumbs
            let crumbs = `<button onclick="navigateTo(null)" class="hover:text-blue-600 flex items-center gap-1 ${!state.currentFolderId ? 'font-bold text-blue-600' : ''}"><i data-lucide="home" class="w-3.5 h-3.5"></i> Root</button>`;
            if (state.currentFolderId) {
                let current = state.currentFolderId;
                let path = [];
                while (current) {
                    const found = state.items.find(i => i.id === current);
                    if (found) { path.unshift(found); current = found.parentId; } else break;
                }
                path.forEach(p => {
                    crumbs += `<i data-lucide="chevron-right" class="w-3.5 h-3.5 text-slate-300"></i><button onclick="navigateTo('${p.id}')" class="hover:text-blue-600 truncate max-w-[120px]">${p.name}</button>`;
                });
            }
            breadcrumbNav.innerHTML = crumbs;

            // Filter & Render Grid
            const filtered = state.items.filter(i => i.parentId === state.currentFolderId)
                .sort((a, b) => a.type === 'folder' && b.type !== 'folder' ? -1 : a.name.localeCompare(b.name));

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 text-center border-2 border-dashed border-slate-200 rounded-3xl bg-white/50">
                        <p class="text-slate-400 font-medium">Empty folder. Add a report to get started.</p>
                    </div>`;
            } else {
                container.innerHTML = filtered.map(item => `
                    <div onclick="${item.type === 'folder' ? `MapsTo('${item.id}')` : `viewDashboard('${item.id}')`}" 
                         class="bg-white border border-slate-200 p-5 rounded-2xl hover:border-blue-500 hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer flex items-center gap-4 group relative">
                        <div class="p-4 rounded-2xl ${item.type === 'folder' ? 'bg-amber-50 text-amber-600' : 'bg-blue-50 text-blue-600'}">
                            <i data-lucide="${item.type === 'folder' ? 'folder' : 'bar-chart-2'}" class="w-7 h-7"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="font-bold text-slate-800 truncate">${item.name}</div>
                            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">${item.type}</div>
                        </div>
                        <button onclick="event.stopPropagation(); deleteItem('${item.id}')" class="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-red-500 transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        // --- Actions ---
        function navigateTo(id) {
            state.currentFolderId = id;
            render();
        }

        function toggleModal(type) {
            const overlay = document.getElementById('modal-overlay');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            
            if (!type) { overlay.classList.add('hidden'); overlay.classList.remove('flex'); return; }

            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            title.innerText = `Add ${type}`;

            if (type === 'folder') {
                body.innerHTML = `<input id="f-name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-4" placeholder="Folder Name"><button onclick="saveFolder()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl">Create</button>`;
            } else if (type === 'dashboard') {
                body.innerHTML = `
                    <input id="d-name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-3" placeholder="Report Name">
                    <input id="d-url" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-4" placeholder="Power BI Embed Link">
                    <button onclick="saveDashboard()" class="w-full py-4 bg-slate-900 text-white font-bold rounded-2xl">Save Report</button>`;
            } else if (type === 'share') {
                const url = state.config.baseUrl ? `${state.config.baseUrl}?id=${appId}` : window.location.href;
                body.innerHTML = `
                    <p class="text-sm text-slate-500 mb-4">Share this link with your team.</p>
                    <input readonly value="${url}" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-4 text-xs font-mono">
                    <button onclick="copyLink('${url}')" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl" id="copy-btn">Copy Link</button>`;
            } else if (type === 'settings') {
                body.innerHTML = `
                    <p class="text-sm text-slate-500 mb-4">Production Base URL (e.g. your Vercel link)</p>
                    <input id="s-url" value="${state.config.baseUrl || ''}" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-4" placeholder="https://my-bi-repo.vercel.app">
                    <button onclick="saveSettings()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl">Update Config</button>`;
            }
            lucide.createIcons();
        }

        async function saveFolder() {
            const name = document.getElementById('f-name').value;
            if (!name) return;
            await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('repository_items').add({
                name, type: 'folder', parentId: state.currentFolderId, createdAt: new Date().toISOString()
            });
            toggleModal(null);
        }

        async function saveDashboard() {
            const name = document.getElementById('d-name').value;
            const url = document.getElementById('d-url').value;
            if (!name || !url) return;
            await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('repository_items').add({
                name, url, type: 'dashboard', parentId: state.currentFolderId, createdAt: new Date().toISOString()
            });
            toggleModal(null);
        }

        async function saveSettings() {
            const url = document.getElementById('s-url').value;
            await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('settings').set({ baseUrl: url }, { merge: true });
            toggleModal(null);
        }

        function viewDashboard(id) {
            const item = state.items.find(i => i.id === id);
            if (item && item.url) window.open(item.url, '_blank');
        }

        async function deleteItem(id) {
            if (confirm('Delete this item?')) {
                await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('repository_items').doc(id).delete();
            }
        }

        function copyLink(url) {
            navigator.clipboard.writeText(url);
            const btn = document.getElementById('copy-btn');
            btn.innerText = 'Copied!';
            btn.classList.replace('bg-blue-600', 'bg-green-500');
            setTimeout(() => toggleModal(null), 1000);
        }

        window.onload = init;
    </script>
</body>
</html>
